```html
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitud de Factura | Dots Color</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

<style>

body{
font-family:'Roboto',sans-serif;
margin:0;
background:#f4f6f8;
}

/* NAVBAR */

.navbar{
background:white;
border-bottom:1px solid rgba(0,0,0,0.08);
position:fixed;
width:100%;
top:0;
}

.navbar-container{
max-width:1100px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
height:65px;
padding:0 20px;
}

.logo{
font-weight:700;
font-size:1.3rem;
color:#007FFF;
text-decoration:none;
}

.btn{
padding:10px 20px;
border-radius:8px;
text-decoration:none;
font-weight:600;
background:#007FFF;
color:white;
}

/* CONTENEDOR */

.container{
max-width:800px;
margin:auto;
padding:120px 20px 60px;
}

/* CARD */

.card{
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

/* TITULO */

.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
margin-bottom:10px;
}

.title p{
color:#637381;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

label{
font-weight:500;
margin-bottom:5px;
}

input,select,textarea{

padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;

}

textarea{
resize:none;
height:100px;
}

.full{
grid-column:1/3;
}

.submit-btn{

margin-top:25px;
width:100%;
padding:14px;

background:#007FFF;
color:white;

border:none;
border-radius:8px;

font-size:16px;
font-weight:600;

cursor:pointer;

}

.submit-btn:hover{
background:#005fcc;
}

/* RESPONSIVE */

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<div class="navbar-container">

<a href="index.html" class="logo">Dots Color</a>

<a href="index.html" class="btn">Volver</a>

</div>

</header>

<!-- FORMULARIO -->

<section class="container">

<div class="card">

<div class="title">

<h1>Solicitud de Factura</h1>

<p>Llena el siguiente formulario para solicitar tu factura electrónica.</p>

</div>

<form>

<div class="form-grid">

<div class="input-group">
<label>Folio de Ticket / Compra *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>RFC *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Nombre o Razón Social *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Correo electrónico *</label>
<input type="email" required>
</div>

<div class="input-group">
<label>Uso de CFDI</label>
<select>
<option>G03 - Gastos en general</option>
<option>P01 - Por definir</option>
<option>D01 - Honorarios médicos</option>
<option>I01 - Construcciones</option>
</select>
</div>

<div class="input-group">
<label>Régimen Fiscal</label>
<select>
<option>601 - General de Ley</option>
<option>612 - Personas físicas</option>
<option>626 - RESICO</option>
<option>625 - Actividades empresariales</option>
</select>
</div>

<div class="input-group">
<label>Método de pago</label>
<select>
<option>PUE - Pago en una sola exhibición</option>
<option>PPD - Pago en parcialidades</option>
</select>
</div>

<div class="input-group">
<label>Forma de pago</label>
<select>
<option>01 - Efectivo</option>
<option>03 - Transferencia</option>
<option>04 - Tarjeta crédito</option>
<option>28 - Tarjeta débito</option>
</select>
</div>

<div class="input-group full">
<label>Subir Constancia de Situación Fiscal (opcional)</label>
<input type="file">
</div>

<div class="input-group full">
<label>Comentarios adicionales</label>
<textarea placeholder="Ejemplo: Facturar a nombre de..."></textarea>
</div>

</div>

<button class="submit-btn">

Enviar solicitud de factura

</button>

</form>

</div>

</section>

</body>

</html>
```
