
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Koraima · Cumpleaños Épico 21 Marzo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #0a0a2a;
            color: white;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        .main-message {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 2rem 3rem;
            margin: 1rem;
            border: 1px solid rgba(255,215,0,0.6);
            box-shadow: 0 0 50px rgba(255, 100, 150, 0.4);
            animation: glowPulse 3s infinite alternate;
            pointer-events: auto;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #FFD966, #FF6AC2, #6EE7FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,100,150,0.3);
            letter-spacing: 2px;
        }

        .date {
            font-size: 1.3rem;
            font-weight: 300;
            margin-top: 0.8rem;
            letter-spacing: 2px;
            color: #FFE5B4;
        }

        .date i {
            margin: 0 8px;
            color: #FFB347;
        }

        .sub {
            font-size: 1.1rem;
            margin-top: 1rem;
            font-weight: 400;
            background: rgba(0,0,0,0.4);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
        }

        .btn-celebrate {
            margin-top: 1.8rem;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            padding: 14px 36px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 25px rgba(255,75,43,0.6);
            font-family: inherit;
            pointer-events: auto;
        }

        .btn-celebrate:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,75,43,0.9);
        }

        .confetti-btn {
            margin-top: 1rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.6);
            padding: 8px 28px;
            font-size: 1rem;
            border-radius: 40px;
            color: #FFECB3;
            cursor: pointer;
            transition: 0.2s;
            pointer-events: auto;
            font-weight: 500;
        }

        .confetti-btn:hover {
            background: rgba(255,200,100,0.3);
            color: white;
            transform: scale(1.02);
        }

        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 20px rgba(255, 100, 150, 0.3);
                border-color: rgba(255,215,0,0.4);
            }
            100% {
                box-shadow: 0 0 60px rgba(255, 160, 210, 0.7);
                border-color: rgba(255,215,0,0.9);
            }
        }

        .floating-hearts {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: floatUp 6s linear forwards;
            color: #ff6b9d;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            15% {
                opacity: 0.9;
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .main-message {
                padding: 1.2rem 1.8rem;
            }
            .sub {
                font-size: 0.85rem;
            }
            .btn-celebrate {
                padding: 10px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="heartsContainer"></div>

    <div class="hero">
        <div class="main-message">
            <h1>🎂 ¡FELIZ CUMPLEAÑOS, KORAIMA! 🎉</h1>
            <div class="date">
                <i class="fas fa-star"></i> 21 de Marzo <i class="fas fa-cake-candles"></i>
            </div>
            <div class="sub">
                <i class="fas fa-crown"></i> Que tu día sea tan épico como tú <i class="fas fa-crown"></i>
            </div>
            <button class="btn-celebrate" id="fireworksBtn">✨ ENCENDER FIESTA ✨</button><br>
            <button class="confetti-btn" id="confettiBtn"><i class="fas fa-confetti"></i> ¡LLUVIA DE ALEGRÍA!</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- ESCENA 3D ÉPICA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.2, 11);
        camera.lookAt(0, 1.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);
        
        // Postprocesado Bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.7;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // Controles con auto-rotación
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.target.set(0, 1.5, 0);
        
        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffccaa, 1.2);
        mainLight.position.set(3, 6, 4);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x6688ff, 0.6);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xff66aa, 0.7);
        backLight.position.set(0, 2.5, -5);
        scene.add(backLight);
        
        const colorLight1 = new THREE.PointLight(0xff44aa, 0.8);
        colorLight1.position.set(3.5, 2, 2);
        scene.add(colorLight1);
        const colorLight2 = new THREE.PointLight(0x44ffaa, 0.8);
        colorLight2.position.set(-3.2, 1.5, 3);
        scene.add(colorLight2);
        const colorLight3 = new THREE.PointLight(0xffaa44, 0.7);
        colorLight3.position.set(1, 3, -3);
        scene.add(colorLight3);
        
        // --- TORTA 3D ---
        // Base
        const basePlate = new THREE.Mesh(
            new THREE.CylinderGeometry(2.3, 2.3, 0.2, 32),
            new THREE.MeshStandardMaterial({ color: 0xd4af7a, metalness: 0.6, roughness: 0.4 })
        );
        basePlate.position.set(0, -0.55, 0);
        basePlate.castShadow = true;
        scene.add(basePlate);
        
        // Capas de la torta
        const layers = [
            { color: 0xf7c9b0, radius: 1.85, height: 0.48, y: -0.25 },
            { color: 0xf0a28c, radius: 1.5, height: 0.48, y: 0.2 },
            { color: 0xe07a5f, radius: 1.15, height: 0.48, y: 0.65 }
        ];
        
        layers.forEach(layer => {
            const cakeLayer = new THREE.Mesh(
                new THREE.CylinderGeometry(layer.radius, layer.radius, layer.height, 48),
                new THREE.MeshStandardMaterial({ color: layer.color, roughness: 0.3, metalness: 0.1 })
            );
            cakeLayer.position.set(0, layer.y, 0);
            cakeLayer.castShadow = true;
            scene.add(cakeLayer);
            
            // Borde decorativo
            const border = new THREE.Mesh(
                new THREE.TorusGeometry(layer.radius + 0.05, 0.06, 32, 100),
                new THREE.MeshStandardMaterial({ color: 0xffe5b4, emissive: 0x442200 })
            );
            border.rotation.x = Math.PI / 2;
            border.position.set(0, layer.y + layer.height/2, 0);
            scene.add(border);
        });
        
        // Velas
        const candleMat = new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0xff3366 });
        const flameMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff6600 });
        
        const candlePositions = [-0.7, 0, 0.7];
        candlePositions.forEach(xPos => {
            const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.15, 0.65, 24), candleMat);
            candle.position.set(xPos, 0.95, 0);
            scene.add(candle);
            
            const flame = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), flameMat);
            flame.position.set(xPos, 1.28, 0);
            scene.add(flame);
        });
        
        // Vela central más grande
        const centerCandle = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.8, 24), candleMat);
        centerCandle.position.set(0, 0.95, 0);
        scene.add(centerCandle);
        const bigFlame = new THREE.Mesh(new THREE.SphereGeometry(0.15, 24, 24), flameMat);
        bigFlame.position.set(0, 1.38, 0);
        scene.add(bigFlame);
        
        // Partículas brillantes alrededor
        const sparkleCount = 500;
        const sparkleGeo = new THREE.BufferGeometry();
        const sparklePos = [];
        for (let i = 0; i < sparkleCount; i++) {
            const radius = 2.3 + Math.random() * 1.8;
            const angle = Math.random() * Math.PI * 2;
            const yOff = -0.2 + Math.random() * 2.5;
            sparklePos.push(Math.cos(angle) * radius, yOff, Math.sin(angle) * radius);
        }
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sparklePos), 3));
        const sparklePoints = new THREE.Points(sparkleGeo, new THREE.PointsMaterial({ color: 0xffaa77, size: 0.045, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(sparklePoints);
        
        // Estrellas de fondo
        const starFieldGeo = new THREE.BufferGeometry();
        const starPositions = [];
        for (let i = 0; i < 1200; i++) {
            starPositions.push((Math.random() - 0.5) * 200);
            starPositions.push((Math.random() - 0.5) * 100);
            starPositions.push((Math.random() - 0.5) * 80 - 40);
        }
        starFieldGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
        const starPoints = new THREE.Points(starFieldGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
        scene.add(starPoints);
        
        // Globos flotantes
        const balloonColors = [0xff4d6d, 0xffb347, 0x4d9eff, 0x9b5de5, 0xf15fbb, 0x6cff6c];
        const balloons = [];
        for (let i = 0; i < 20; i++) {
            const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            const balloon = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 32, 32),
                new THREE.MeshStandardMaterial({ color: color, emissive: 0x331100, roughness: 0.2 })
            );
            const angle = (i / 20) * Math.PI * 2;
            const radius = 3.5 + Math.random() * 1.2;
            const height = 2.2 + Math.random() * 2.8;
            balloon.userData = {
                angle: angle,
                radius: radius,
                speed: 0.004 + Math.random() * 0.008,
                yOffset: height,
                floatSpeed: 0.006 + Math.random() * 0.01
            };
            balloon.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
            scene.add(balloon);
            
            // Cuerda
            const rope = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, 0.8, 4),
                new THREE.MeshStandardMaterial({ color: 0xbc9a6c })
            );
            rope.position.set(0, -0.45, 0);
            balloon.add(rope);
            balloons.push(balloon);
        }
        
        // Texto 3D con letras brillantes (usando planos con textura)
        const createLetterTexture = (letter, hue) => {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'Bold 160px "Montserrat"';
            ctx.fillStyle = `hsl(${hue}, 100%, 65%)`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(letter, canvas.width/2, canvas.height/2);
            const texture = new THREE.CanvasTexture(canvas);
            return new THREE.MeshStandardMaterial({ map: texture, transparent: true, emissive: `hsl(${hue}, 80%, 30%)` });
        };
        
        const letters = ['K', 'O', 'R', 'A', 'I', 'M', 'A'];
        letters.forEach((letter, idx) => {
            const hue = 320 + idx * 15;
            const mat = createLetterTexture(letter, hue);
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 1.05), mat);
            plane.position.set(-2.6 + idx * 0.88, 3.1, -1.5);
            plane.lookAt(0, 2.5, -2);
            scene.add(plane);
        });
        
        // Anillo de confeti giratorio
        const ringParticles = new THREE.BufferGeometry();
        const ringPositions = [];
        for (let i = 0; i < 800; i++) {
            const rad = 3.2;
            const ang = Math.random() * Math.PI * 2;
            const yPos = -0.3 + Math.random() * 3.5;
            ringPositions.push(Math.cos(ang) * rad, yPos, Math.sin(ang) * rad);
        }
        ringParticles.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPositions), 3));
        const ringPoints = new THREE.Points(ringParticles, new THREE.PointsMaterial({ color: 0xffaa66, size: 0.05, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        // --- ANIMACIONES Y EFECTOS ---
        let time = 0;
        
        // Sistema de fuegos artificiales mejorado
        function createFirework(x, z) {
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];
            const colors = [];
            
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = x;
                positions[i*3+1] = 1.2;
                positions[i*3+2] = z;
                const vx = (Math.random() - 0.5) * 6;
                const vy = Math.random() * 6 + 2;
                const vz = (Math.random() - 0.5) * 6;
                velocities.push({ x: vx, y: vy, z: vz });
                colors.push(Math.random() * 360);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.12, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            let life = 0;
            function animateFirework() {
                life += 0.03;
                const posAttr = particles.geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    posAttr[i*3] += velocities[i].x * 0.22;
                    posAttr[i*3+1] += velocities[i].y * 0.22;
                    posAttr[i*3+2] += velocities[i].z * 0.22;
                    velocities[i].y -= 0.22;
                    velocities[i].x *= 0.99;
                    velocities[i].z *= 0.99;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                const hue = (Date.now() * 0.005) % 360;
                material.color.setHSL(hue / 360, 1, 0.6);
                
                if (life < 2.8) {
                    requestAnimationFrame(animateFirework);
                } else {
                    scene.remove(particles);
                    particles.geometry.dispose();
                }
            }
            requestAnimationFrame(animateFirework);
        }
        
        function burstFireworks() {
            for (let i = 0; i < 16; i++) {
                const angle = (i / 16) * Math.PI * 2;
                const rad = 4.2;
                setTimeout(() => {
                    createFirework(Math.cos(angle) * rad, Math.sin(angle) * rad);
                }, i * 70);
            }
            setTimeout(() => {
                for (let i = 0; i < 30; i++) {
                    const x = (Math.random() - 0.5) * 9;
                    const z = (Math.random() - 0.5) * 7;
                    createFirework(x, z);
                }
            }, 500);
        }
        
        // Confeti con canvas-confetti
        function launchConfetti() {
            if (typeof canvasConfetti !== 'undefined') {
                canvasConfetti({ particleCount: 400, spread: 120, origin: { y: 0.6 }, startVelocity: 20, colors: ['#ff66aa', '#ffcc44', '#66ffcc', '#ff9966', '#ff66cc'] });
                setTimeout(() => {
                    canvasConfetti({ particleCount: 200, spread: 80, origin: { y: 0.4 }, startVelocity: 15 });
                }, 200);
            }
            // Corazones flotantes
            for (let i = 0; i < 35; i++) {
                setTimeout(() => addFloatingHeart(), i * 50);
            }
        }
        
        function addFloatingHeart() {
            const container = document.getElementById('heartsContainer');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '<i class="fas fa-heart"></i>';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = 4 + Math.random() * 5 + 's';
            heart.style.fontSize = 1.3 + Math.random() * 1.8 + 'rem';
            heart.style.opacity = 0.6 + Math.random() * 0.4;
            heart.style.color = `hsl(${Math.random() * 60 + 320}, 80%, 65%)`;
            container.appendChild(heart);
            setTimeout(() => { if(heart.parentNode) heart.remove(); }, 7000);
        }
        
        // Event listeners
        document.getElementById('fireworksBtn').addEventListener('click', () => {
            burstFireworks();
            colorLight1.intensity = 1.6;
            colorLight2.intensity = 1.6;
            colorLight3.intensity = 1.4;
            setTimeout(() => { 
                colorLight1.intensity = 0.8;
                colorLight2.intensity = 0.8;
                colorLight3.intensity = 0.7;
            }, 1000);
        });
        
        document.getElementById('confettiBtn').addEventListener('click', () => {
            launchConfetti();
        });
        
        // Animación principal
        function animate() {
            requestAnimationFrame(animate);
            time += 0.015;
            
            // Animación de globos
            balloons.forEach(balloon => {
                const data = balloon.userData;
                if (data) {
                    data.angle += data.speed;
                    const rad = data.radius + Math.sin(time * 0.6) * 0.08;
                    balloon.position.x = Math.cos(data.angle) * rad;
                    balloon.position.z = Math.sin(data.angle) * rad;
                    balloon.position.y = data.yOffset + Math.sin(time * data.floatSpeed * 4) * 0.06;
                }
            });
            
            // Rotación de elementos
            ringPoints.rotation.y += 0.008;
            sparklePoints.rotation.y += 0.005;
            starPoints.rotation.x = Math.sin(time * 0.03) * 0.05;
            
            // Luces móviles
            colorLight1.position.x = 3.6 * Math.sin(time * 0.6);
            colorLight1.position.z = 2.8 * Math.cos(time * 0.5);
            colorLight2.position.x = -3.4 * Math.sin(time * 0.8);
            colorLight2.position.z = 3.2 * Math.cos(time * 0.4);
            colorLight3.position.x = 1.8 * Math.sin(time * 0.9);
            colorLight3.position.z = -2.5 * Math.cos(time * 0.7);
            
            // Llama titilante
            const flicker = 0.1 * Math.sin(time * 25);
            bigFlame.scale.setScalar(1 + flicker * 0.3);
            
            controls.update();
            effectComposer.render();
        }
        
        animate();
        
        // Cargar canvas-confetti
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1';
        script.onload = () => {
            window.canvasConfetti = confetti;
            console.log('🎉 Confetti listo!');
        };
        document.head.appendChild(script);
        
        // Generar corazones periódicos
        setInterval(() => {
            if (Math.random() > 0.65) addFloatingHeart();
        }, 1500);
        
        for (let i = 0; i < 10; i++) setTimeout(() => addFloatingHeart(), i * 200);
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('%c🎂 ¡FELIZ CUMPLEAÑOS KORAIMA! 🎉 21 de Marzo', 'color: #ff66cc; font-size: 18px; font-weight: bold;');
        console.log('%c✨ Que este día sea mágico y lleno de alegría ✨', 'color: #ffaa44; font-size: 14px;');
    </script>
</body>
</html>
